<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aprende Data — Próximamente</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0e1a;
      --surface: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.09);
      --accent: #6c63ff;
      --accent-2: #ff6584;
      --text: #f0f0f0;
      --muted: #8a8fa8;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      /* Ocupa exactamente la pantalla visible, incluyendo móvil con barra de navegación */
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: clamp(1rem, 4vh, 2rem) clamp(1rem, 5vw, 2rem);
      overflow: hidden;
    }

    /* Gradiente de fondo */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 15% 15%, rgba(108, 99, 255, 0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 85%, rgba(255, 101, 132, 0.14) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout principal ── */
    .main {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(0.6rem, 2.5vh, 1.4rem);
      flex: 1;
      justify-content: center;
    }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.35rem 0.9rem;
      font-size: clamp(0.65rem, 1.8vw, 0.78rem);
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.75); }
    }

    /* Título */
    h1 {
      font-size: clamp(2rem, 9vw, 4.2rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.02em;
      text-align: center;
    }

    h1 span {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Subtítulo */
    .subtitle {
      font-size: clamp(0.82rem, 2.2vw, 1.05rem);
      color: var(--muted);
      line-height: 1.6;
      text-align: center;
      max-width: 480px;
    }

    /* Countdown */
    .countdown {
      display: flex;
      justify-content: center;
      gap: clamp(0.5rem, 2.5vw, 1.2rem);
      width: 100%;
    }

    .countdown-item {
      flex: 1;
      max-width: 90px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: clamp(10px, 2vw, 14px);
      padding: clamp(0.6rem, 2vh, 1.1rem) 0.5rem;
      text-align: center;
    }

    .countdown-number {
      font-size: clamp(1.5rem, 5.5vw, 2.6rem);
      font-weight: 700;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .countdown-label {
      font-size: clamp(0.58rem, 1.5vw, 0.68rem);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 0.3rem;
    }

    /* Formulario */
    .form-wrapper {
      display: flex;
      gap: 0.6rem;
      width: 100%;
      max-width: 460px;
    }

    .form-wrapper input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: clamp(0.65rem, 1.8vh, 0.85rem) 1rem;
      color: var(--text);
      font-size: clamp(0.85rem, 2vw, 0.95rem);
      outline: none;
      transition: border-color 0.2s;
      min-width: 0; /* evita overflow en flex */
    }

    .form-wrapper input::placeholder { color: var(--muted); }
    .form-wrapper input:focus        { border-color: var(--accent); }

    .btn {
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: clamp(0.65rem, 1.8vh, 0.85rem) clamp(1rem, 3vw, 1.4rem);
      font-size: clamp(0.85rem, 2vw, 0.95rem);
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.15s;
      flex-shrink: 0;
    }

    .btn:hover  { opacity: 0.88; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    /* Mensaje éxito */
    .success-msg {
      display: none;
      color: #6ee7b7;
      font-size: clamp(0.78rem, 1.8vw, 0.88rem);
      text-align: center;
    }

    /* Redes sociales */
    .socials {
      display: flex;
      justify-content: center;
      gap: clamp(0.6rem, 2vw, 1rem);
    }

    .social-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: clamp(36px, 8vw, 42px);
      height: clamp(36px, 8vw, 42px);
      border-radius: 9px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s, border-color 0.2s, transform 0.15s;
    }

    .social-link:hover {
      color: var(--text);
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .social-link svg {
      width: clamp(15px, 3.5vw, 18px);
      height: clamp(15px, 3.5vw, 18px);
      fill: currentColor;
    }

    /* Footer */
    footer {
      position: relative;
      z-index: 1;
      color: var(--muted);
      font-size: clamp(0.68rem, 1.6vw, 0.78rem);
      text-align: center;
      padding-bottom: env(safe-area-inset-bottom, 0); /* notch iOS */
    }

    /* ── Ajuste landscape móvil ── */
    @media (max-height: 500px) {
      .subtitle { display: none; }
      .main { gap: 0.5rem; }
    }
  </style>
</head>
<body>

  <div class="main">

    <div class="badge">
      <span class="badge-dot"></span>
      Próximamente
    </div>

    <h1>Aprende<span>Data</span></h1>

    <p class="subtitle">
      Estamos construyendo algo increíble. Una plataforma para aprender ciencia de datos, machine learning e inteligencia artificial. 100% gratuito.
    </p>

    <div class="countdown">
      <div class="countdown-item">
        <div class="countdown-number" id="days">00</div>
        <div class="countdown-label">Días</div>
      </div>
      <div class="countdown-item">
        <div class="countdown-number" id="hours">00</div>
        <div class="countdown-label">Horas</div>
      </div>
      <div class="countdown-item">
        <div class="countdown-number" id="minutes">00</div>
        <div class="countdown-label">Min</div>
      </div>
      <div class="countdown-item">
        <div class="countdown-number" id="seconds">00</div>
        <div class="countdown-label">Seg</div>
      </div>
    </div>

    <div class="form-wrapper">
      <input type="email" id="email-input" placeholder="tu@email.com" />
      <button class="btn" onclick="subscribe()">Notifícame</button>
    </div>

    <p class="success-msg" id="success-msg">¡Listo! Te avisaremos cuando lancemos 🚀</p>

    <div class="socials">
      <a href="#" class="social-link" aria-label="Twitter / X">
        <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      </a>
      <a href="#" class="social-link" aria-label="LinkedIn">
        <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
      </a>
      <a href="#" class="social-link" aria-label="YouTube">
        <svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
      </a>
      <a href="#" class="social-link" aria-label="Instagram">
        <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>
      </a>
    </div>

  </div>

  <footer>© 2026 AprendeData · Todos los derechos reservados</footer>

  <script>
    const target = new Date();
    target.setMonth(target.getMonth() + 3);

    const pad = n => String(n).padStart(2, '0');

    function updateCountdown() {
      const diff = target - new Date();
      if (diff <= 0) return;
      document.getElementById('days').textContent    = pad(Math.floor(diff / 86400000));
      document.getElementById('hours').textContent   = pad(Math.floor((diff % 86400000) / 3600000));
      document.getElementById('minutes').textContent = pad(Math.floor((diff % 3600000) / 60000));
      document.getElementById('seconds').textContent = pad(Math.floor((diff % 60000) / 1000));
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    function subscribe() {
      const input = document.getElementById('email-input');
      const msg   = document.getElementById('success-msg');
      const email = input.value.trim();

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        input.style.borderColor = '#ff6584';
        setTimeout(() => input.style.borderColor = '', 1500);
        return;
      }

      input.value = '';
      msg.style.display = 'block';
      setTimeout(() => msg.style.display = 'none', 4000);
    }

    document.getElementById('email-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') subscribe();
    });
  </script>

</body>
</html>
